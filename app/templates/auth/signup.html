<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up – {{ settings.site_name }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>:root{--primary:{{ settings.primary_color }};--secondary:{{ settings.secondary_color }};--accent:{{ settings.accent_color }};--text:{{ settings.text_color }};--sidebar:{{ settings.sidebar_color }};--bg:{{ settings.bg_color }}}</style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <h1>{{ settings.site_name }}</h1>
            <p class="subtitle">Create your account</p>
            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="flash flash-{{ category }}">{{ message }}</div>
            {% endfor %}
            {% endif %}
            {% endwith %}
            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" class="input" required minlength="3" autocomplete="username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" class="input" required minlength="6" autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" name="confirm_password" class="input" required minlength="6" autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label>Invite Code</label>
                    <input type="text" name="invite_code" class="input" required placeholder="XXXX-XXXX" pattern="[A-Za-z0-9]{4}-[A-Za-z0-9]{4}" autocomplete="off" style="text-transform:uppercase">
                </div>
                <button type="submit" class="btn">Sign Up</button>
            </form>
            <div class="auth-link">
                Already have an account? <a href="{{ url_for('login') }}">Login</a>
            </div>
        </div>
    </div>
</body>
</html>
