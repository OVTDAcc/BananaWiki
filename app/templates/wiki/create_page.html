{% extends "base.html" %}
{% block title %}Create Page – {{ settings.site_name }}{% endblock %}
{% block content %}
<h1>Create New Page</h1>

<div class="info-callout">
    First create the page by giving it a title. After it exists, open the page and start editing it there using the Markdown editor.
</div>

<form method="POST" id="createForm">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="form-group">
        <label>Title</label>
        <input type="text" name="title" class="input" required value="{{ form.title if form else '' }}" style="max-width:500px">
    </div>
    <div class="form-group">
        <label>Category (optional)</label>
        <select name="category_id" class="input" style="max-width:300px">
            <option value="" {% if not form or not form.category_id %}selected{% endif %}>Uncategorized</option>
            {% for cat in all_categories %}
            <option value="{{ cat.id }}" {% if form and form.category_id == cat.id|string %}selected{% endif %}>{{ cat.name }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="form-actions">
        <button type="submit" class="btn">Create Page</button>
        <a href="{{ url_for('home') }}" class="btn btn-outline">Cancel</a>
    </div>
</form>
{% endblock %}
