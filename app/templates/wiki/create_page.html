{% extends "base.html" %}
{% block title %}Create Page – {{ settings.site_name }}{% endblock %}
{% block content %}
<h1>Create New Page</h1>

<form method="POST">
    <div class="form-group">
        <label>Title</label>
        <input type="text" name="title" class="input" required>
    </div>
    <div class="form-group">
        <label>Category</label>
        <select name="category_id" class="input">
            <option value="">Uncategorized</option>
            {% for cat in all_categories %}
            <option value="{{ cat.id }}">{{ cat.name }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="form-group">
        <label>Content (Markdown)</label>
        <textarea name="content" class="editor-area-legacy" placeholder="Write your page in markdown..."></textarea>
    </div>
    <div class="form-actions">
        <button type="submit" class="btn">Create Page</button>
        <a href="{{ url_for('home') }}" class="btn btn-outline">Cancel</a>
    </div>
</form>
{% endblock %}
