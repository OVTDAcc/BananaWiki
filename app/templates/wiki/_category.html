<div class="nav-section" {% if depth is defined %}style="padding-left:{{ depth * 0.75 }}rem"{% endif %}>
    <div class="nav-section-header">
        <span class="nav-section-title">{{ cat.name }}</span>
        {% if current_user and current_user.role in ('editor', 'admin') %}
        <div class="cat-actions">
            <button class="btn-icon-tiny" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='block'?'none':'block'" title="Edit">Edit</button>
            <div class="inline-edit" style="display:none">
                <form method="POST" action="{{ url_for('edit_category', cat_id=cat.id) }}" class="inline-form">
                    <input type="text" name="name" value="{{ cat.name }}" class="input input-sm">
                    <button type="submit" class="btn-icon-tiny">OK</button>
                </form>
                <form method="POST" action="{{ url_for('delete_category_route', cat_id=cat.id) }}" class="inline-form" onsubmit="return confirm('Delete this category?')">
                    <button type="submit" class="btn-icon-tiny btn-danger-icon">Del</button>
                </form>
            </div>
        </div>
        {% endif %}
    </div>
    {% for p in cat.pages %}
    <a href="{{ url_for('view_page', slug=p.slug) }}" class="nav-item {% if page and page.id == p.id %}active{% endif %}">
        {{ p.title }}
    </a>
    {% endfor %}
    {% for child in cat.children %}
        {% with cat=child, depth=(depth|default(0)) + 1 %}
            {% include "wiki/_category.html" %}
        {% endwith %}
    {% endfor %}
</div>
