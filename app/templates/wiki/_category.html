<div class="nav-section" {% if depth is defined %}style="padding-left:{{ depth * 0.75 }}rem"{% endif %}>
    <div class="nav-section-header">
        <button class="cat-toggle" onclick="this.closest('.nav-section').classList.toggle('collapsed')" title="Toggle category" aria-label="Toggle category">▾</button>
        <span class="nav-section-title">{{ cat.name }}</span>
        {% if current_user and current_user.role in ('editor', 'admin') %}
        <div class="cat-actions">
            <button class="btn-icon-tiny" onclick="var el=this.closest('.nav-section-header').querySelector('.cat-manage-panel');el.style.display=el.style.display==='block'?'none':'block'" title="Manage category" aria-label="Manage category">&#9881;</button>
        </div>
        <div class="cat-manage-panel" style="display:none">
            <!-- Rename -->
            <form method="POST" action="{{ url_for('edit_category', cat_id=cat.id) }}" class="inline-form cat-manage-row">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <input type="text" name="name" value="{{ cat.name }}" class="input input-sm" required maxlength="100" style="flex:1;min-width:80px">
                <button type="submit" class="btn btn-sm">Rename</button>
            </form>
            <!-- Delete -->
            <form method="POST" action="{{ url_for('delete_category_route', cat_id=cat.id) }}" class="cat-manage-row" id="catDeleteForm{{ cat.id }}" onsubmit="return confirmCatDelete(this, {{ cat.pages|length }}, {{ cat.name|tojson }})">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <input type="hidden" name="page_action" value="uncategorize" class="cat-page-action">
                <input type="hidden" name="target_category_id" value="" class="cat-target-id">
                <div class="cat-delete-options">
                    <label class="cat-radio"><input type="radio" name="page_action_ui" value="uncategorize" checked onchange="this.closest('form').querySelector('.cat-page-action').value='uncategorize';this.closest('form').querySelector('.cat-move-target').style.display='none'"> Move pages to Uncategorized</label>
                    <label class="cat-radio"><input type="radio" name="page_action_ui" value="move" onchange="this.closest('form').querySelector('.cat-page-action').value='move';this.closest('form').querySelector('.cat-move-target').style.display='block'"> Move pages to:</label>
                    <select class="input input-sm cat-move-target" style="display:none;margin-left:1.2rem;margin-bottom:.3rem" onchange="this.closest('form').querySelector('.cat-target-id').value=this.value">
                        {% for c in all_categories if c.id != cat.id %}
                        <option value="{{ c.id }}">{{ c.name }}</option>
                        {% endfor %}
                    </select>
                    <label class="cat-radio"><input type="radio" name="page_action_ui" value="delete" onchange="this.closest('form').querySelector('.cat-page-action').value='delete';this.closest('form').querySelector('.cat-move-target').style.display='none'"> Delete all pages in category</label>
                </div>
                <button type="submit" class="btn btn-sm btn-danger" style="margin-top:.3rem">Delete Category</button>
            </form>
        </div>
        {% endif %}
    </div>
    <div class="nav-section-body">
        {% for p in cat.pages %}
        <a href="{{ url_for('view_page', slug=p.slug) }}" class="nav-item {% if page and page.id == p.id %}active{% endif %}">
            {{ p.title }}
        </a>
        {% endfor %}
        {% for child in cat.children %}
            {% with cat=child, depth=(depth|default(0)) + 1 %}
                {% include "wiki/_category.html" %}
            {% endwith %}
        {% endfor %}
    </div>
</div>
