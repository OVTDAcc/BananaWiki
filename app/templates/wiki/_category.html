<div class="nav-section" {% if depth is defined %}style="padding-left:{{ depth * 0.75 }}rem"{% endif %}>
    <div class="nav-section-header">
        <span class="nav-section-title">{{ cat.name }}</span>
        {% if current_user and current_user.role in ('editor', 'admin') %}
        <div class="cat-actions">
            <button class="btn-icon-tiny cat-edit-toggle" onclick="var el=this.closest('.nav-section-header').querySelector('.inline-edit');el.style.display=el.style.display==='block'?'none':'block'" title="Edit category" aria-label="Edit category">&#9998;</button>
            <form method="POST" action="{{ url_for('delete_category_route', cat_id=cat.id) }}" class="inline-form" onsubmit="return confirm({{ ('Delete category \"%s\"? Pages in this category will become uncategorized.' % cat.name)|tojson }})">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <button type="submit" class="btn-icon-tiny btn-danger-icon" title="Delete category" aria-label="Delete category">&#10005;</button>
            </form>
        </div>
        <div class="inline-edit" style="display:none">
            <form method="POST" action="{{ url_for('edit_category', cat_id=cat.id) }}" class="inline-form">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <input type="text" name="name" value="{{ cat.name }}" class="input input-sm" required maxlength="100">
                <button type="submit" class="btn-icon-tiny" title="Save">&#10003;</button>
            </form>
        </div>
        {% endif %}
    </div>
    {% for p in cat.pages %}
    <a href="{{ url_for('view_page', slug=p.slug) }}" class="nav-item {% if page and page.id == p.id %}active{% endif %}">
        {{ p.title }}
    </a>
    {% endfor %}
    {% for child in cat.children %}
        {% with cat=child, depth=(depth|default(0)) + 1 %}
            {% include "wiki/_category.html" %}
        {% endwith %}
    {% endfor %}
</div>
