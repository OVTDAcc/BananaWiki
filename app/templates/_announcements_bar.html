{% if active_announcements %}
<div id="announcements-bar" class="announcements-bar" style="display:none" aria-live="polite">
    {% for ann in active_announcements %}
    <div class="announcement-slide announcement-color-{{ ann.color }} announcement-size-{{ ann.text_size }}"
         data-ann-id="{{ ann.id }}" style="display:none">
        <div class="ann-inner">
            <div class="ann-body wiki-content">
                {% if ann.content | length > 500 %}
                {{ ann.content[:490] | render_md }}
                <a href="{{ url_for('view_announcement', ann_id=ann.id) }}" class="ann-readmore">Read more →</a>
                {% else %}
                {{ ann.content | render_md }}
                {% endif %}
            </div>
            <div class="ann-controls">
                <button class="ann-nav ann-prev" aria-label="Previous announcement" style="display:none">&#8249;</button>
                <span class="ann-counter" style="display:none"><span class="ann-current">1</span></span>
                <button class="ann-nav ann-next" aria-label="Next announcement" style="display:none">&#8250;</button>
                <button class="ann-close" data-ann-id="{{ ann.id }}" aria-label="Dismiss announcement">&#10005;</button>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endif %}
